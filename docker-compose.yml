services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shipments
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-shipments_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shipments
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-shipments_user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-shipments_user} -d shipments"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: