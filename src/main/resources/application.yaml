spring:
  application:
    name: shipment-tracking-system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/shipments}
    username: ${SPRING_DATASOURCE_USERNAME:shipments_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}