spring:
  application:
    name: shipment-tracking-system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/shipments}
    username: ${SPRING_DATASOURCE_USERNAME:shipments_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
            batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
jwt:
  secret: shipment-tracking-system-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000
server:
  port: ${SERVER_PORT:8080}

